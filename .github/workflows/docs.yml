name: Build and deploy docs

on:
  push:
    branches: [main]
    paths: [docs/**, .github/workflows/docs.yml]
  pull_request:
    types: [opened, labeled, synchronize]
    paths: [docs/**, .github/workflows/docs.yml]

jobs:
  run:
    uses: RubberDuckCrew/.github/.github/workflows/action-docs.yml@56e4f827ad3706fe96a060b0aae589f9e2dd5c30 # v2.1.0
    with:
      project-name: gitdone
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    permissions:
      contents: read
      deployments: write
      pull-requests: write
