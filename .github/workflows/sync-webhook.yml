name: Sync webhook

on:
  schedule:
    - cron: "0 3 * * 0"
  push:
    branches: [main]
    paths: [.github/workflows/sync-webhook.yml]
  workflow_dispatch:

jobs:
  run:
    uses: RubberDuckCrew/.github/.github/workflows/action-sync-webhook.yml@44514881ffd4d4403f96b145e1438af5d93d47f4 # v2.2.1
    with:
      bot-app-id: ${{ vars.RUBBERDUCKCREW_BOT_APP_ID }}
    secrets:
      BOT_APP_PRIVATE_KEY: ${{ secrets.RUBBERDUCKCREW_BOT_APP_PRIVATE_KEY }}
      WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
