name: Close Actions

on:
  issues:
    types: [closed]
  pull_request:
    types: [closed]

jobs:
  run:
    uses: RubberDuckCrew/.github/.github/workflows/action-close-actions.yml@0968afd074c1d7ee5654414dc45027fc9c35d8d3 # v1
    secrets: inherit
    permissions:
      issues: write
      pull-requests: write
      actions: write
